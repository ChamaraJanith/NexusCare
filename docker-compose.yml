services:
  user-patient-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/user-patient-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    networks:
      - nexuscare

  doctor-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/doctor-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    depends_on:
      - video-session-integration-service
    networks:
      - nexuscare

  appointment-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/appointment-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    depends_on:
      - doctor-service
    networks:
      - nexuscare

  ai-symptom-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/ai-symptom-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    networks:
      - nexuscare

  video-session-integration-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/video-session-integration-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    networks:
      - nexuscare

  notification-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/notification-service:/app
    command: sh -c "npm install && npm start"
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    networks:
      - nexuscare

  fee-management-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/fee-management-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    networks:
      - nexuscare

  payment-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/payment-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    networks:
      - nexuscare

  api-gateway:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend/api-gateway:/app
    ports:
      - '8080:8080'
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    depends_on:
      - user-patient-service
      - doctor-service
      - appointment-service
      - ai-symptom-service
      - video-session-integration-service
      - notification-service
      - fee-management-service
      - payment-service
    networks:
      - nexuscare

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexuscare

networks:
  nexuscare:
    driver: bridge
